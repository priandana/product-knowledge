<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Knowledge</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        ::-webkit-scrollbar { width: 4px; background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .dropdown-scroll::-webkit-scrollbar { width: 6px; }
    </style>
</head>
<body class="bg-gray-50 text-slate-900 pb-24">

    <!-- GANTI URL INI DENGAN URL WEB APP DARI GOOGLE APPS SCRIPT -->
    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwvhCwcarGQwnj2OqCCVY9EqI2Yqm0jk-omIp1EUZIvZKlhaSH9tW20_vHXmxHqoB1EMQ/exec"; 
    </script>

    <!-- Header Ala GoPay -->
    <div class="bg-blue-600 pb-24 pt-10 px-6 rounded-b-[45px] shadow-lg">
        <div class="flex justify-between items-center mb-6">
            <div>
                <h1 class="text-white text-2xl font-bold tracking-tight uppercase">Product<span class="text-cyan-300">Knowledge</span></h1>
                <p class="text-blue-100 text-[10px] tracking-widest font-semibold opacity-80">STATIONARY & RETAIL GUIDE</p>
            </div>
            <div class="bg-white/20 p-2 rounded-2xl text-white backdrop-blur-md">
                <i data-lucide="info" class="w-5 h-5"></i>
            </div>
        </div>

        <!-- Search Bar Etalase -->
        <div class="relative group">
            <div class="absolute inset-y-0 left-4 flex items-center pointer-events-none">
                <i data-lucide="search" class="w-[18px] h-[18px] text-gray-400 group-focus-within:text-blue-600 transition-colors"></i>
            </div>
            <input 
                type="text" 
                id="searchInput"
                placeholder="Cari PLU atau Nama di Etalase..."
                class="w-full bg-white py-4 pl-12 pr-4 rounded-2xl shadow-sm focus:outline-none focus:ring-4 focus:ring-blue-300/30 transition-all border-none"
            >
        </div>
    </div>

    <!-- Dashboard Area -->
    <div class="px-6 -mt-12">
        <div class="bg-white rounded-[32px] shadow-xl p-5 flex justify-between items-center border border-gray-100">
            <div class="flex flex-col items-center flex-1 border-r border-gray-100">
                <div class="bg-blue-50 p-3 rounded-2xl mb-1.5 text-blue-600">
                    <i data-lucide="package" class="w-[22px] h-[22px]"></i>
                </div>
                <span class="text-[9px] font-bold text-gray-400 uppercase tracking-tighter">Master SKU</span>
                <span id="masterCount" class="font-extrabold text-lg text-slate-800">0</span>
            </div>
            <div class="flex flex-col items-center flex-1 border-r border-gray-100">
                <div class="bg-emerald-50 p-3 rounded-2xl mb-1.5 text-emerald-600">
                    <i data-lucide="layout-grid" class="w-[22px] h-[22px]"></i>
                </div>
                <span class="text-[9px] font-bold text-gray-400 uppercase tracking-tighter">Etalase</span>
                <span id="etalaseCount" class="font-extrabold text-lg text-slate-800">0</span>
            </div>
            <div class="flex flex-col items-center flex-1">
                <button 
                    onclick="openModal()"
                    class="bg-orange-50 p-3 rounded-2xl mb-1.5 text-orange-600 hover:bg-orange-100 active:scale-90 transition transform"
                >
                    <i data-lucide="plus" class="w-[22px] h-[22px]"></i>
                </button>
                <span class="text-[9px] font-bold text-gray-400 uppercase tracking-tighter">Input</span>
                <span class="font-extrabold text-lg text-orange-600">Baru</span>
            </div>
        </div>
    </div>

    <!-- Product Etalase Grid -->
    <div class="px-6 mt-10">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-lg font-black text-slate-800 tracking-tight">Katalog Produk</h2>
            <div id="loadingSpinner" class="hidden w-5 h-5 border-3 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
        </div>
        
        <div id="emptyState" class="hidden text-center py-20 bg-white rounded-[40px] border-2 border-dashed border-gray-200">
            <i data-lucide="box" class="w-12 h-12 mx-auto mb-3 text-gray-200"></i>
            <p class="text-gray-400 text-sm font-medium">Belum ada barang di etalase...</p>
        </div>

        <div id="productGrid" class="grid grid-cols-2 gap-4 sm:grid-cols-3 md:grid-cols-4">
            <!-- Produk akan di-render di sini oleh JavaScript -->
        </div>
    </div>

    <!-- Modal Zoom Gambar -->
    <div id="zoomModal" class="hidden fixed inset-0 z-[200] bg-black/95 flex-col items-center justify-center p-4" onclick="closeZoom()">
        <button class="absolute top-10 right-10 text-white hover:text-red-400 transition">
            <i data-lucide="x" class="w-10 h-10"></i>
        </button>
        <img id="zoomImage" src="" alt="Zoom" class="max-w-full max-h-[80vh] rounded-2xl shadow-2xl transition-transform duration-300 scale-95" />
        <p class="text-white/60 text-sm mt-6 font-medium tracking-widest uppercase">Klik dimana saja untuk kembali</p>
    </div>

    <!-- Modal Form Tambah Barang -->
    <div id="inputModal" class="hidden fixed inset-0 z-[100] flex items-end justify-center sm:items-center bg-black/60 backdrop-blur-md p-0 sm:p-4 transition-opacity">
        <div class="bg-white w-full max-w-md rounded-t-[45px] sm:rounded-[45px] p-8 shadow-2xl overflow-y-auto max-h-[90vh] transform transition-transform translate-y-full" id="modalContent">
            <div class="flex justify-between items-center mb-6">
                <div>
                    <h2 class="text-xl font-black text-slate-800 uppercase tracking-tighter italic">Input Produk</h2>
                    <div class="h-1 w-12 bg-blue-600 rounded-full mt-1"></div>
                </div>
                <button onclick="closeModal()" class="bg-gray-100 p-2 rounded-full text-gray-400 hover:text-red-500 transition">
                    <i data-lucide="x" class="w-6 h-6"></i>
                </button>
            </div>
            
            <form id="productForm" class="space-y-5">
                <!-- Image Input Section -->
                <div class="relative group">
                    <div class="w-full h-40 bg-gray-50 rounded-[32px] border-2 border-dashed border-gray-200 flex flex-col items-center justify-center overflow-hidden relative group-hover:border-blue-300 transition-colors">
                        <div id="uploadPlaceholder" class="flex flex-col items-center text-gray-300">
                            <i data-lucide="camera" class="w-9 h-9 mb-2"></i>
                            <p class="text-[10px] font-bold text-gray-400 uppercase">Ambil Foto / Pilih File</p>
                        </div>
                        <img id="imagePreview" src="" class="hidden w-full h-full object-cover" alt="Preview" />
                        <input type="file" id="fileInput" accept="image/*" capture="environment" class="absolute inset-0 opacity-0 cursor-pointer" />
                    </div>
                    <button type="button" id="removeImageBtn" onclick="removeImage()" class="hidden absolute -top-2 -right-2 bg-red-500 text-white p-1.5 rounded-full shadow-lg">
                        <i data-lucide="x" class="w-4 h-4"></i>
                    </button>
                </div>

                <!-- Searchable Dropdown Barang -->
                <div class="space-y-1 relative" id="dropdownContainer">
                    <label class="text-[10px] font-black text-slate-400 uppercase ml-2 tracking-widest">Ketik & Pilih Nama Barang</label>
                    <div class="relative">
                        <input 
                            type="text" 
                            id="searchableNameInput" 
                            autocomplete="off"
                            placeholder="Ketik nama produk..." 
                            class="w-full bg-slate-50 border-none p-4 pr-10 rounded-2xl focus:ring-4 focus:ring-blue-100 transition-all font-bold uppercase italic"
                        >
                        <i data-lucide="chevron-down" class="w-5 h-5 absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 pointer-events-none"></i>
                    </div>
                    <!-- Pop-up List Options -->
                    <div id="dropdownList" class="hidden absolute z-50 w-full bg-white border border-gray-100 rounded-2xl mt-2 max-h-48 overflow-y-auto shadow-2xl dropdown-scroll">
                        <!-- List dari JS -->
                    </div>
                </div>

                <!-- Display PLU -->
                <div class="space-y-1">
                    <label class="text-[10px] font-black text-slate-400 uppercase ml-2 tracking-widest">PLU (Otomatis)</label>
                    <input id="pluInput" disabled placeholder="Pilih produk dulu..." class="w-full bg-blue-50 border-none p-3 rounded-2xl text-blue-600 font-bold placeholder-blue-300" />
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div class="space-y-1">
                        <label class="text-[10px] font-black text-slate-400 uppercase text-center block tracking-widest">Inner / Ctn</label>
                        <input type="number" id="ctnInput" placeholder="1 Ctn = ? Inn" class="w-full bg-slate-50 border-none p-4 rounded-2xl text-center focus:ring-4 focus:ring-blue-100 font-bold text-sm">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] font-black text-slate-400 uppercase text-center block tracking-widest">Pcs / Inner</label>
                        <input type="number" id="innInput" placeholder="1 Inn = ? Pcs" class="w-full bg-slate-50 border-none p-4 rounded-2xl text-center focus:ring-4 focus:ring-blue-100 font-bold text-sm">
                    </div>
                </div>

                <button type="submit" id="submitBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-5 rounded-[24px] shadow-xl shadow-blue-200 transition-all active:scale-95 flex items-center justify-center gap-3 mt-4 opacity-50 cursor-not-allowed" disabled>
                    <div id="btnIcon"><i data-lucide="package" class="w-5 h-5"></i></div>
                    <span id="btnText" class="tracking-widest italic">SIMPAN BARANG</span>
                </button>
            </form>
        </div>
    </div>

    <script>
        // Inisiasi Ikon Lucide
        lucide.createIcons();

        // State variables
        let productsData = [];
        let masterSKUData = [];
        let base64Image = "";
        let selectedProductData = null; // Menyimpan data produk yg dipilih

        // Elements
        const loadingSpinner = document.getElementById('loadingSpinner');
        const emptyState = document.getElementById('emptyState');
        const productGrid = document.getElementById('productGrid');
        const searchInput = document.getElementById('searchInput');

        // Fetch Data from Google Sheets
        async function loadData() {
            if (!SCRIPT_URL) {
                console.warn("SCRIPT_URL belum diisi!");
                return;
            }
            loadingSpinner.classList.remove('hidden');
            try {
                const response = await fetch(SCRIPT_URL);
                const data = await response.json();
                productsData = data.products || [];
                masterSKUData = data.masterSKU || [];
                
                document.getElementById('masterCount').innerText = masterSKUData.length;
                renderGrid(productsData);
            } catch (error) {
                console.error("Gagal load data:", error);
            } finally {
                loadingSpinner.classList.add('hidden');
            }
        }

        // Render Etalase Grid
        function renderGrid(dataToRender) {
            document.getElementById('etalaseCount').innerText = dataToRender.length;
            
            if (dataToRender.length === 0) {
                emptyState.classList.remove('hidden');
                productGrid.innerHTML = "";
                return;
            }
            
            emptyState.classList.add('hidden');
            productGrid.innerHTML = dataToRender.map(p => `
                <div class="bg-white rounded-[32px] overflow-hidden shadow-sm border border-gray-100 hover:shadow-lg transition-all group active:scale-95 duration-200 flex flex-col">
                    <div class="relative h-40 bg-gray-50 cursor-zoom-in flex-shrink-0" onclick="openZoom('${p.foto || ''}')">
                        ${p.foto ? `<img src="${p.foto}" alt="${p.nama}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" />` 
                                : `<div class="w-full h-full flex items-center justify-center text-gray-200"><i data-lucide="image" class="w-8 h-8"></i></div>`}
                        <div class="absolute inset-0 bg-black/0 group-hover:bg-black/10 transition-colors flex items-center justify-center">
                            <i data-lucide="zoom-in" class="text-white opacity-0 group-hover:opacity-100 transition-opacity w-6 h-6"></i>
                        </div>
                        <div class="absolute top-3 left-3 bg-white/90 backdrop-blur-md px-2 py-1 rounded-lg shadow-sm">
                            <span class="text-[8px] font-black text-blue-700 tracking-tighter">PLU ${p.plu || '-'}</span>
                        </div>
                    </div>
                    <div class="p-3 flex-grow flex flex-col justify-between">
                        <h3 class="font-extrabold text-slate-800 text-[11px] leading-tight mb-3 uppercase italic line-clamp-2">${p.nama}</h3>
                        <div class="flex justify-between items-center bg-slate-50 rounded-2xl p-2 border border-slate-100">
                            <div class="text-center flex-1">
                                <p class="text-[7px] text-gray-400 font-bold uppercase tracking-widest mb-0.5">1 CTN=</p>
                                <p class="text-[10px] font-black text-blue-600">${p.ctn || '0'} INN</p>
                            </div>
                            <div class="w-[1px] h-6 bg-gray-200 mx-1"></div>
                            <div class="text-center flex-1">
                                <p class="text-[7px] text-gray-400 font-bold uppercase tracking-widest mb-0.5">1 INN=</p>
                                <p class="text-[10px] font-black text-emerald-600">${p.inn || '0'} PCS</p>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        // Search Etalase
        searchInput.addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            const filtered = productsData.filter(p => 
                (p.nama && p.nama.toLowerCase().includes(val)) || 
                (p.plu && p.plu.toString().includes(val))
            );
            renderGrid(filtered);
        });

        // ----------------------------------------------------
        // LOGIKA SEARCHABLE DROPDOWN
        // ----------------------------------------------------
        const searchableNameInput = document.getElementById('searchableNameInput');
        const dropdownList = document.getElementById('dropdownList');
        const pluInput = document.getElementById('pluInput');
        const dropdownContainer = document.getElementById('dropdownContainer');

        function renderDropdownList(items) {
            if (items.length === 0) {
                dropdownList.innerHTML = `<div class="p-4 text-center text-xs text-gray-400 font-bold">Produk tidak ditemukan</div>`;
                return;
            }
            dropdownList.innerHTML = items.map(sku => {
                const escapedName = sku.nama.replace(/'/g, "\\'").replace(/"/g, '&quot;');
                return `<div class="p-3 hover:bg-blue-50 cursor-pointer text-xs font-bold text-slate-700 border-b border-gray-50 uppercase" onclick="selectProduct('${escapedName}')">${sku.nama}</div>`;
            }).join('');
        }

        // Tampilkan list saat diklik
        searchableNameInput.addEventListener('focus', () => {
            dropdownList.classList.remove('hidden');
            renderDropdownList(masterSKUData);
        });

        // Filter list saat diketik
        searchableNameInput.addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            const filtered = masterSKUData.filter(sku => sku.nama.toLowerCase().includes(val));
            renderDropdownList(filtered);
            dropdownList.classList.remove('hidden');

            // Reset PLU jika ngetik ulang manual
            selectedProductData = null;
            pluInput.value = '';
            checkSubmitButton();
        });

        // Fungsi saat list barang di-klik
        window.selectProduct = function(nama) {
            searchableNameInput.value = nama;
            dropdownList.classList.add('hidden');
            
            selectedProductData = masterSKUData.find(m => m.nama === nama);
            pluInput.value = selectedProductData ? selectedProductData.plu : '';
            checkSubmitButton();
        };

        // Sembunyikan list kalau ngeklik di luar area dropdown
        document.addEventListener('click', (e) => {
            if (!dropdownContainer.contains(e.target)) {
                dropdownList.classList.add('hidden');
            }
        });
        // ----------------------------------------------------


        // Image Upload Logic
        const fileInput = document.getElementById('fileInput');
        const imagePreview = document.getElementById('imagePreview');
        const uploadPlaceholder = document.getElementById('uploadPlaceholder');
        const removeImageBtn = document.getElementById('removeImageBtn');

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onloadend = () => {
                    base64Image = reader.result;
                    imagePreview.src = base64Image;
                    imagePreview.classList.remove('hidden');
                    uploadPlaceholder.classList.add('hidden');
                    removeImageBtn.classList.remove('hidden');
                    checkSubmitButton();
                };
                reader.readAsDataURL(file);
            }
        });

        function removeImage() {
            base64Image = "";
            fileInput.value = "";
            imagePreview.src = "";
            imagePreview.classList.add('hidden');
            uploadPlaceholder.classList.remove('hidden');
            removeImageBtn.classList.add('hidden');
            checkSubmitButton();
        }

        // Tombol Simpan
        function checkSubmitButton() {
            const submitBtn = document.getElementById('submitBtn');
            if (selectedProductData && base64Image !== "") {
                submitBtn.disabled = false;
                submitBtn.classList.remove('opacity-50', 'cursor-not-allowed');
            } else {
                submitBtn.disabled = true;
                submitBtn.classList.add('opacity-50', 'cursor-not-allowed');
            }
        }

        document.getElementById('productForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!SCRIPT_URL) { alert("URL Script Google belum dimasukkan!"); return; }

            const btnText = document.getElementById('btnText');
            const btnIcon = document.getElementById('btnIcon');
            const submitBtn = document.getElementById('submitBtn');

            submitBtn.disabled = true;
            submitBtn.classList.add('bg-slate-400');
            submitBtn.classList.remove('bg-blue-600', 'hover:bg-blue-700');
            btnText.innerText = "MENYIMPAN...";
            btnIcon.innerHTML = `<div class="w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin"></div>`;

            // Data yang dikirim ke Google Sheets (Backend Apps Script)
            const payload = {
                nama: selectedProductData.nama, // Kirim nama yang valid dari master
                foto: base64Image,
                ctn: document.getElementById('ctnInput').value || '0', // Nilai Inner / Ctn
                inn: document.getElementById('innInput').value || '0', // Nilai Pcs / Inner
                pcs: '1' // Default satuan terkecil
            };

            try {
                await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
                
                closeModal();
                document.getElementById('productForm').reset();
                searchableNameInput.value = '';
                selectedProductData = null;
                pluInput.value = '';
                removeImage();
                
                loadData();
            } catch (error) {
                alert("Terjadi kesalahan saat menyimpan data.");
            } finally {
                submitBtn.classList.remove('bg-slate-400');
                submitBtn.classList.add('bg-blue-600', 'hover:bg-blue-700');
                btnText.innerText = "SIMPAN BARANG";
                btnIcon.innerHTML = `<i data-lucide="package" class="w-5 h-5"></i>`;
                lucide.createIcons();
                checkSubmitButton();
            }
        });

        // Modal Controls
        function openModal() {
            const modal = document.getElementById('inputModal');
            const content = document.getElementById('modalContent');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            setTimeout(() => content.classList.remove('translate-y-full'), 10);
            checkSubmitButton();
        }

        function closeModal() {
            const modal = document.getElementById('inputModal');
            const content = document.getElementById('modalContent');
            content.classList.add('translate-y-full');
            setTimeout(() => {
                modal.classList.add('hidden');
                modal.classList.remove('flex');
            }, 300);
        }

        function openZoom(imgSrc) {
            if(!imgSrc) return;
            const modal = document.getElementById('zoomModal');
            const img = document.getElementById('zoomImage');
            img.src = imgSrc;
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            setTimeout(() => img.classList.remove('scale-95'), 10);
        }

        function closeZoom() {
            const modal = document.getElementById('zoomModal');
            const img = document.getElementById('zoomImage');
            img.classList.add('scale-95');
            setTimeout(() => {
                modal.classList.add('hidden');
                modal.classList.remove('flex');
                img.src = "";
            }, 300);
        }

        loadData();

    </script>
</body>
</html>
