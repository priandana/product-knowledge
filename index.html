<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <meta name="theme-color" content="#2563EB">
    <title>Product Knowledge - Retail Guide</title>
    
    <link rel="manifest" href="data:application/manifest+json;charset=utf-8,%7B%22name%22%3A%22Product%20Knowledge%22%2C%22short_name%22%3A%22Katalog%22%2C%22start_url%22%3A%22.%2F%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%23F3F4F6%22%2C%22theme_color%22%3A%22%232563EB%22%7D">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #e2e8f0; overscroll-behavior-y: none; }
        input, select, button { font-size: 16px !important; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .glass-header { background: linear-gradient(135deg, #1E3A8A 0%, #2563EB 100%); }
        .quiz-overlay { backdrop-filter: blur(8px); }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .badge-new { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }
        
        /* Mobile App Container Layout untuk Desktop */
        .app-container {
            max-width: 520px;
            margin: 0 auto;
            background-color: #F8FAFC;
            min-h-screen;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            position: relative;
        }
    </style>
</head>
<body class="text-slate-800 flex justify-center">

    <!-- App Wrapper -->
    <div class="app-container w-full min-h-screen pb-20">

        <!-- Header & Search -->
        <div class="glass-header text-white pt-6 pb-16 px-5 rounded-b-[2.5rem] shadow-lg sticky top-0 z-40">
            <div class="w-full flex justify-between items-center mb-6">
                <div>
                    <h1 class="text-2xl font-extrabold tracking-tight">PRODUCT<span class="text-blue-300">KNOWLEDGE</span></h1>
                    <p class="text-[10px] text-blue-200 font-bold tracking-wider uppercase">Retail & Warehouse Guide</p>
                </div>
                <div class="flex gap-2">
                    <button onclick="toggleQuizMode()" class="bg-white/20 p-2 rounded-full hover:bg-white/30 transition shadow" title="Mode Latihan">
                        <i data-lucide="gamepad-2" class="w-5 h-5"></i>
                    </button>
                    <button id="adminBtn" onclick="loginAdmin()" class="bg-white/20 p-2 rounded-full hover:bg-white/30 transition shadow" title="Login Admin">
                        <i data-lucide="lock" class="w-5 h-5" id="adminIcon"></i>
                    </button>
                </div>
            </div>
            
            <div class="w-full relative">
                <i data-lucide="search" class="absolute left-4 top-3.5 w-5 h-5 text-gray-400"></i>
                <input type="text" id="searchInput" placeholder="Cari PLU atau Nama Barang..." oninput="filterProducts()" 
                       class="w-full bg-white text-gray-800 rounded-2xl py-3 pl-12 pr-4 shadow-xl focus:outline-none focus:ring-4 focus:ring-blue-300/50">
            </div>

            <!-- Filter Kategori (Departemen) -->
            <div class="w-full mt-5 flex gap-2 overflow-x-auto hide-scrollbar pb-1">
                <button onclick="setCategory('All')" id="tab-All" class="cat-tab px-4 py-1.5 rounded-full text-xs font-bold bg-white text-blue-600 shadow transition whitespace-nowrap">Semua</button>
                <button onclick="setCategory('Freezer')" id="tab-Freezer" class="cat-tab px-4 py-1.5 rounded-full text-xs font-bold bg-white/20 text-white hover:bg-white/30 transition whitespace-nowrap">Freezer</button>
                <button onclick="setCategory('Chiller')" id="tab-Chiller" class="cat-tab px-4 py-1.5 rounded-full text-xs font-bold bg-white/20 text-white hover:bg-white/30 transition whitespace-nowrap">Chiller</button>
                <button onclick="setCategory('Ambient')" id="tab-Ambient" class="cat-tab px-4 py-1.5 rounded-full text-xs font-bold bg-white/20 text-white hover:bg-white/30 transition whitespace-nowrap">Ambient</button>
            </div>
        </div>

        <!-- Main Content -->
        <div class="w-full px-5 -mt-8 relative z-10">
            
            <!-- Stats & Input Panel -->
            <div class="bg-white rounded-3xl shadow-sm p-4 mb-6 flex w-full border border-gray-100">
                <div class="text-center flex-1 border-r border-gray-100 flex flex-col justify-center px-2">
                    <i data-lucide="database" class="w-6 h-6 mx-auto text-blue-500 mb-1"></i>
                    <p class="text-[10px] text-gray-400 uppercase font-bold break-words">Total Item</p>
                    <p class="text-lg font-black text-slate-700 leading-tight mt-1" id="totalItemCount">0</p>
                </div>
                <div class="text-center flex-1 cursor-pointer hidden flex-col justify-center px-2" id="btnAddSection" onclick="toggleForm()">
                    <i data-lucide="plus-circle" class="w-6 h-6 mx-auto text-orange-500 mb-1"></i>
                    <p class="text-[10px] text-gray-400 uppercase font-bold break-words">Input</p>
                    <p class="text-lg font-black text-orange-600 leading-tight mt-1">Baru</p>
                </div>
                <div class="text-center flex-1 opacity-50 flex flex-col justify-center px-2" id="btnLockedSection">
                    <i data-lucide="shield-alert" class="w-6 h-6 mx-auto text-gray-400 mb-1"></i>
                    <p class="text-[10px] text-gray-400 uppercase font-bold break-words">Akses</p>
                    <p class="text-sm font-black text-gray-500 mt-1 leading-tight">Lihat</p>
                </div>
            </div>

            <!-- Indicator Loading/Offline -->
            <div id="statusIndicator" class="text-center mb-4 text-xs font-bold text-blue-600 bg-blue-50 py-2 rounded-lg animate-pulse">
                Menghubungkan ke server...
            </div>

            <!-- Form Tambah (Tersembunyi) -->
            <div id="inputForm" class="hidden bg-white p-5 rounded-[2rem] shadow-2xl border border-blue-100 mb-8 transform transition-all">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-lg font-black text-blue-800 italic uppercase">Input Produk Baru</h2>
                    <button onclick="toggleForm()" class="bg-gray-100 p-2 rounded-full text-gray-400 hover:text-red-500"><i data-lucide="x" class="w-4 h-4"></i></button>
                </div>
                
                <div class="space-y-4">
                    <!-- Dropdown Nama Pintar (Datalist) -->
                    <div>
                        <label class="block text-[10px] font-black text-gray-400 mb-1 tracking-widest uppercase">Nama Barang dari Master</label>
                        <input type="text" id="inputNama" list="namaList" placeholder="Ketik atau pilih nama..." 
                               class="w-full bg-slate-50 border-none rounded-xl p-4 focus:ring-4 focus:ring-blue-100 font-bold uppercase italic text-sm text-slate-700">
                        <datalist id="namaList"></datalist>
                    </div>

                    <div class="flex gap-3">
                        <div class="w-1/2">
                            <label class="block text-[10px] font-black text-gray-400 mb-1 tracking-widest uppercase text-center">1 CTN = ? INN</label>
                            <input type="number" id="inputCtn" placeholder="0" class="w-full bg-slate-50 border-none rounded-xl p-4 focus:ring-4 focus:ring-blue-100 text-center font-black text-lg text-blue-600">
                        </div>
                        <div class="w-1/2">
                            <label class="block text-[10px] font-black text-gray-400 mb-1 tracking-widest uppercase text-center">1 INN = ? PCS</label>
                            <input type="number" id="inputInn" placeholder="0" class="w-full bg-slate-50 border-none rounded-xl p-4 focus:ring-4 focus:ring-blue-100 text-center font-black text-lg text-emerald-600">
                        </div>
                    </div>

                    <div>
                        <label class="block text-[10px] font-black text-gray-400 mb-1 tracking-widest uppercase">Foto Aktual Produk</label>
                        <div class="relative w-full h-36 border-2 border-dashed border-slate-200 rounded-2xl bg-slate-50 flex flex-col items-center justify-center cursor-pointer overflow-hidden group hover:border-blue-300" onclick="document.getElementById('inputFile').click()">
                            <img id="previewImg" class="absolute inset-0 w-full h-full object-cover hidden">
                            <div id="uploadPrompt" class="text-center group-hover:scale-110 transition">
                                <i data-lucide="camera" class="w-8 h-8 text-slate-300 mx-auto mb-2"></i>
                                <span class="text-[10px] font-bold text-slate-400 uppercase">Ketuk untuk Kamera/Galeri</span>
                            </div>
                            <input type="file" id="inputFile" accept="image/*" capture="environment" class="hidden" onchange="compressAndPreview(event)">
                        </div>
                    </div>

                    <button id="btnSimpan" onclick="simpanData()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-4 rounded-2xl shadow-lg shadow-blue-200 flex justify-center items-center gap-2 mt-4 transition">
                        <i data-lucide="save" class="w-5 h-5"></i> SIMPAN BARANG
                    </button>
                </div>
            </div>

            <!-- Etalase Produk -->
            <h2 class="text-base font-black text-slate-800 mb-4 px-1 tracking-tight" id="sectionTitle">Semua Produk</h2>
            <div id="productGrid" class="grid grid-cols-1 sm:grid-cols-2 gap-4 pb-10">
                <!-- Kartu Produk Akan Muncul Di Sini -->
            </div>
        </div>

    </div> <!-- End App Wrapper -->

    <!-- Mode Ujian / Kuis Overlay -->
    <div id="quizModal" class="hidden fixed inset-0 z-50 quiz-overlay bg-black/60 flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-sm rounded-[2rem] overflow-hidden shadow-2xl transform transition-all">
            <div class="bg-indigo-600 p-4 text-center text-white relative">
                <button onclick="toggleQuizMode()" class="absolute top-4 right-4 text-white/70 hover:text-white"><i data-lucide="x"></i></button>
                <h2 class="text-xl font-black flex justify-center items-center gap-2">
                    <i data-lucide="brain-circuit"></i> MODE LATIHAN
                </h2>
                <p class="text-xs text-indigo-200 mt-1">Uji Pengetahuan Produkmu!</p>
            </div>
            
            <div class="p-6 text-center">
                <div class="w-full h-48 bg-slate-100 rounded-xl mb-4 flex items-center justify-center overflow-hidden border">
                    <img id="quizImg" src="" class="max-h-full max-w-full object-contain">
                </div>
                <h3 id="quizName" class="font-black text-slate-800 italic text-lg leading-tight mb-6">NAMA BARANG</h3>
                
                <div class="flex gap-3 mb-6">
                    <div class="w-1/2 text-left">
                        <label class="block text-[10px] font-black text-gray-400 mb-1 tracking-widest uppercase">Isi 1 CTN?</label>
                        <input type="number" id="quizAnsCtn" class="w-full bg-slate-50 border-2 border-indigo-100 rounded-xl p-3 text-center font-black text-xl focus:border-indigo-500 focus:outline-none">
                    </div>
                    <div class="w-1/2 text-left">
                        <label class="block text-[10px] font-black text-gray-400 mb-1 tracking-widest uppercase">Isi 1 INN?</label>
                        <input type="number" id="quizAnsInn" class="w-full bg-slate-50 border-2 border-indigo-100 rounded-xl p-3 text-center font-black text-xl focus:border-indigo-500 focus:outline-none">
                    </div>
                </div>

                <div id="quizFeedback" class="hidden rounded-xl p-3 mb-4 font-bold text-sm"></div>

                <div class="flex gap-2">
                    <button onclick="checkQuizAnswer()" id="btnCekKuis" class="w-2/3 bg-indigo-600 text-white font-black py-3 rounded-xl shadow">CEK JAWABAN</button>
                    <button onclick="nextQuizQuestion()" class="w-1/3 bg-slate-200 text-slate-600 font-black py-3 rounded-xl hover:bg-slate-300">LEWATI</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Zoom Modal -->
    <div id="zoomModal" class="hidden fixed inset-0 bg-black/90 z-50 flex flex-col items-center justify-center p-4" onclick="closeZoom()">
        <button class="absolute top-6 right-6 bg-white/20 rounded-full p-2 text-white hover:bg-white/40"><i data-lucide="x"></i></button>
        <div id="zoomLoader" class="loader absolute"></div>
        <img id="zoomedImage" class="max-w-full max-h-[80vh] rounded-xl object-contain hidden" onload="document.getElementById('zoomLoader').style.display='none'; this.classList.remove('hidden')">
        <p id="zoomedTitle" class="text-white mt-4 font-bold text-center"></p>
    </div>

    <script>
        // INISIALISASI
        lucide.createIcons();
        
        // ----------------------------------------------------
        // GANTI DENGAN URL GOOGLE APPS SCRIPT KAMU
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxxf9-JAUcNnju1VJvOjiAOXH_ldWSPSxG5H7USqLUXgKRndtIvRnImHoMjqht2wllGZg/exec"; 
        // ----------------------------------------------------

        let products = [];
        let masterNames = [];
        let isAdmin = false;
        let currentCategory = "All";
        let currentQuizProduct = null;

        const base64Data = { string: "" };

        async function loadData() {
            const ind = document.getElementById("statusIndicator");
            
            // Cek Cache Lokal
            const cachedData = localStorage.getItem('retailKatalogData');
            if (cachedData) {
                products = JSON.parse(cachedData);
                renderGrid(products);
                ind.innerHTML = "Memuat data terbaru... <i data-lucide='wifi-off' class='inline w-4 h-4 ml-1'></i>";
                lucide.createIcons();
            }

            try {
                const response = await fetch(SCRIPT_URL);
                const data = await response.json();
                
                products = data.products || [];
                masterNames = data.masterSKU ? data.masterSKU.map(m => m.nama) : [];
                
                localStorage.setItem('retailKatalogData', JSON.stringify(products));
                renderDatalist();
                
                ind.style.display = "none";
                filterProducts();
            } catch (error) {
                console.error(error);
                ind.classList.remove("text-blue-600", "bg-blue-50");
                ind.classList.add("text-red-600", "bg-red-50");
                if (products.length > 0) {
                    ind.innerHTML = "<i data-lucide='wifi-off' class='inline w-4 h-4 mr-1'></i> Offline Mode. Menampilkan data terakhir tersimpan.";
                } else {
                    ind.innerHTML = "<i data-lucide='alert-triangle' class='inline w-4 h-4 mr-1'></i> Gagal terhubung. Pastikan Apps Script sudah di-Deploy versi baru.";
                }
                lucide.createIcons();
            }
        }

        // --- SISTEM ADMIN & LOGIN ---
        function loginAdmin() {
            if (isAdmin) {
                isAdmin = false;
                document.getElementById('adminIcon').setAttribute('data-lucide', 'lock');
                document.getElementById('btnAddSection').classList.add('hidden');
                document.getElementById('btnLockedSection').classList.remove('hidden');
                document.getElementById('inputForm').classList.add('hidden');
                lucide.createIcons();
                alert("Mode Viewer Aktif.");
                return;
            }

            const pass = prompt("Masukkan Password Admin:");
            if (pass === "admin123") { // <-- GANTI PASSWORD DI SINI
                isAdmin = true;
                document.getElementById('adminIcon').setAttribute('data-lucide', 'unlock');
                document.getElementById('btnLockedSection').classList.add('hidden');
                document.getElementById('btnAddSection').classList.remove('hidden');
                lucide.createIcons();
            } else if (pass !== null) {
                alert("Password Salah!");
            }
        }

        function toggleForm() {
            if(!isAdmin) return;
            const form = document.getElementById("inputForm");
            form.classList.toggle("hidden");
        }

        // --- SISTEM KATEGORI & FILTER ---
        function setCategory(cat) {
            currentCategory = cat;
            document.querySelectorAll('.cat-tab').forEach(btn => {
                btn.className = "cat-tab px-4 py-1.5 rounded-full text-xs font-bold bg-white/20 text-white hover:bg-white/30 transition whitespace-nowrap";
            });
            const activeBtn = document.getElementById(`tab-${cat}`);
            if(activeBtn) activeBtn.className = "cat-tab px-4 py-1.5 rounded-full text-xs font-bold bg-white text-blue-600 shadow transition whitespace-nowrap";
            
            document.getElementById('sectionTitle').innerText = cat === "All" ? "Semua Produk" : `Area: ${cat}`;
            filterProducts();
        }

        function filterProducts() {
            const query = document.getElementById("searchInput").value.toLowerCase();
            
            const filtered = products.filter(p => {
                const matchSearch = (p.plu && p.plu.toString().includes(query)) || 
                                    (p.nama && p.nama.toLowerCase().includes(query));
                
                // Cari kolom yang mengandung kata kategori
                const katData = p['kategori produk'] || p.kategori || "";
                const matchCat = currentCategory === "All" || katData.toLowerCase().includes(currentCategory.toLowerCase());
                
                return matchSearch && matchCat;
            });
            renderGrid(filtered);
        }

        // --- KONVERSI LINK GOOGLE DRIVE ---
        function fixGoogleDriveLink(url) {
            if (!url) return null;
            let fileId = "";
            const idMatch = url.match(/(?:id=|\/d\/)([a-zA-Z0-9_-]{25,})/);
            if (idMatch && idMatch[1]) {
                fileId = idMatch[1];
                return `https://drive.google.com/thumbnail?id=${fileId}&sz=w1000`;
            }
            return url;
        }

        // --- RENDER ETALASE ---
        function renderGrid(data) {
            document.getElementById("totalItemCount").innerText = data.length;
            const grid = document.getElementById("productGrid");
            grid.innerHTML = "";

            if (data.length === 0) {
                grid.innerHTML = `<div class="col-span-full text-center py-12 text-gray-400"><i data-lucide="package-open" class="w-12 h-12 mx-auto mb-3 opacity-30"></i><p class="text-sm font-bold opacity-50">Barang tidak ditemukan.</p></div>`;
                lucide.createIcons();
                return;
            }

            const reversedData = [...data].reverse();

            reversedData.forEach((item, index) => {
                const isNew = index < 5 && currentCategory === "All" && document.getElementById("searchInput").value === "";
                const newBadge = isNew ? `<span class="badge-new absolute top-2 right-2 bg-red-500 text-white text-[9px] font-black px-2 py-1 rounded-md shadow-md z-10 tracking-widest">NEW</span>` : '';
                
                const imgSrc = fixGoogleDriveLink(item.foto);
                let imgHTML = '';
                if(imgSrc) {
                    imgHTML = `<img src="${imgSrc}" loading="lazy" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110" onerror="this.onerror=null; this.parentElement.innerHTML='<div class=\\'flex flex-col items-center text-gray-300\\'><i data-lucide=\\'image-off\\' class=\\'w-8 h-8 mb-1\\'></i><span class=\\'text-[10px] font-bold\\'>Gagal Muat</span></div>'; lucide.createIcons();">`;
                } else {
                    imgHTML = `<div class="flex flex-col items-center text-slate-300"><i data-lucide="image" class="w-10 h-10 mb-1 opacity-50"></i><span class="text-[9px] font-black uppercase tracking-widest opacity-50">Tanpa Foto</span></div>`;
                }

                const card = `
                    <div class="bg-white rounded-3xl p-4 shadow-sm border border-slate-100 flex flex-col justify-between group overflow-hidden relative">
                        ${newBadge}
                        <div>
                            <div class="flex justify-between items-center mb-3">
                                <span class="bg-blue-50 text-blue-600 font-black text-[9px] px-2 py-1 rounded-md tracking-widest">${item.plu || 'NO-PLU'}</span>
                                ${item['kategori produk'] ? `<span class="text-[9px] font-black text-gray-400 uppercase tracking-widest">${item['kategori produk']}</span>` : ''}
                            </div>
                            <div class="w-full h-36 bg-slate-50 rounded-2xl mb-4 flex items-center justify-center overflow-hidden border border-slate-100 cursor-zoom-in" 
                                 onclick="openZoom('${imgSrc}', '${item.nama}')">
                                ${imgHTML}
                            </div>
                            <h3 class="font-black text-slate-800 italic leading-tight mb-4 text-xs h-8 overflow-hidden line-clamp-2">${item.nama}</h3>
                        </div>
                        
                        <div class="bg-slate-50 rounded-2xl p-2.5 flex border border-slate-100 divide-x divide-slate-200">
                            <div class="flex-1 text-center px-1">
                                <p class="text-[8px] font-black text-gray-400 uppercase tracking-widest mb-0.5">1 CTN =</p>
                                <p class="text-xs font-black text-blue-600">${item.ctn || '-'} INN</p>
                            </div>
                            <div class="flex-1 text-center px-1">
                                <p class="text-[8px] font-black text-gray-400 uppercase tracking-widest mb-0.5">1 INN =</p>
                                <p class="text-xs font-black text-emerald-600">${item.pcs || item.inn || '-'} PCS</p>
                            </div>
                        </div>
                    </div>
                `;
                grid.innerHTML += card;
            });
            lucide.createIcons();
        }

        // --- GAMIFIKASI: KUIS MINI ---
        function toggleQuizMode() {
            const modal = document.getElementById("quizModal");
            if (modal.classList.contains("hidden")) {
                if (products.length === 0) {
                    alert("Tunggu data selesai dimuat dulu ya!");
                    return;
                }
                modal.classList.remove("hidden");
                nextQuizQuestion();
            } else {
                modal.classList.add("hidden");
            }
        }

        function nextQuizQuestion() {
            const validProducts = products.filter(p => p.foto && p.ctn);
            if(validProducts.length === 0) {
                alert("Belum cukup data produk untuk kuis.");
                toggleQuizMode();
                return;
            }
            currentQuizProduct = validProducts[Math.floor(Math.random() * validProducts.length)];
            
            document.getElementById("quizImg").src = fixGoogleDriveLink(currentQuizProduct.foto);
            document.getElementById("quizName").innerText = currentQuizProduct.nama;
            document.getElementById("quizAnsCtn").value = "";
            document.getElementById("quizAnsInn").value = "";
            
            const feedback = document.getElementById("quizFeedback");
            feedback.classList.add("hidden");
            document.getElementById("btnCekKuis").classList.remove("hidden");
        }

        function checkQuizAnswer() {
            const ansCtn = document.getElementById("quizAnsCtn").value;
            const ansInn = document.getElementById("quizAnsInn").value;
            const realCtn = currentQuizProduct.ctn;
            const realInn = currentQuizProduct.pcs || currentQuizProduct.inn;

            const feedback = document.getElementById("quizFeedback");
            feedback.classList.remove("hidden");
            document.getElementById("btnCekKuis").classList.add("hidden");

            if (ansCtn == realCtn && ansInn == realInn) {
                feedback.className = "rounded-xl p-3 mb-4 font-black text-sm bg-green-100 text-green-700 border border-green-200";
                feedback.innerHTML = "<i data-lucide='check-circle' class='inline w-5 h-5 mr-1 mb-1'></i> BENAR SEKALI! Lanjut!";
                setTimeout(nextQuizQuestion, 2000);
            } else {
                feedback.className = "rounded-xl p-3 mb-4 font-black text-sm bg-red-100 text-red-700 border border-red-200";
                feedback.innerHTML = `<i data-lucide='x-circle' class='inline w-5 h-5 mr-1 mb-1'></i> SALAH. <br>Yang benar: 1 CTN = ${realCtn} INN | 1 INN = ${realInn} PCS`;
                setTimeout(nextQuizQuestion, 4000);
            }
            lucide.createIcons();
        }

        // --- SISTEM INPUT & KOMPRESI KAMERA ---
        function renderDatalist() {
            const dl = document.getElementById("namaList");
            dl.innerHTML = "";
            masterNames.forEach(name => {
                const opt = document.createElement("option");
                opt.value = name;
                dl.appendChild(opt);
            });
        }

        function compressAndPreview(event) {
            const file = event.target.files[0];
            if (!file) return;

            document.getElementById("uploadPrompt").classList.add("hidden");
            const imgEl = document.getElementById("previewImg");
            imgEl.classList.remove("hidden");
            imgEl.src = URL.createObjectURL(file);

            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement("canvas");
                    const MAX_WIDTH = 800;
                    const scaleSize = MAX_WIDTH / img.width;
                    canvas.width = MAX_WIDTH;
                    canvas.height = img.height * scaleSize;
                    const ctx = canvas.getContext("2d");
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    base64Data.string = canvas.toDataURL("image/jpeg", 0.6);
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function simpanData() {
            const nama = document.getElementById("inputNama").value;
            const ctn = document.getElementById("inputCtn").value;
            const inn = document.getElementById("inputInn").value;

            if (!nama || !ctn || !inn) {
                alert("Pilih Nama, isi CTN dan INN!");
                return;
            }

            const btn = document.getElementById("btnSimpan");
            btn.innerHTML = `<i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i> MENGIRIM...`;
            btn.disabled = true;

            const payload = {
                nama: nama,
                ctn: ctn,
                inn: inn,
                pcs: inn,
                foto: base64Data.string
            };

            fetch(SCRIPT_URL, {
                method: "POST",
                body: JSON.stringify(payload)
            }).then(res => res.json())
              .then(data => {
                  alert("Berhasil disimpan!");
                  document.getElementById("inputNama").value = "";
                  document.getElementById("inputCtn").value = "";
                  document.getElementById("inputInn").value = "";
                  base64Data.string = "";
                  document.getElementById("previewImg").classList.add("hidden");
                  document.getElementById("uploadPrompt").classList.remove("hidden");
                  btn.innerHTML = `<i data-lucide="save" class="w-5 h-5"></i> SIMPAN BARANG`;
                  btn.disabled = false;
                  lucide.createIcons();
                  loadData();
              }).catch(err => {
                  alert("Gagal menyimpan. Pastikan sinyal stabil.");
                  btn.innerHTML = `<i data-lucide="save" class="w-5 h-5"></i> COBA LAGI`;
                  btn.disabled = false;
                  lucide.createIcons();
              });
        }

        // --- ZOOM FITUR ---
        function openZoom(imgSrc, title) {
            if(!imgSrc || imgSrc === 'null') return;
            const modal = document.getElementById("zoomModal");
            const img = document.getElementById("zoomedImage");
            document.getElementById("zoomedTitle").innerText = title;
            img.classList.add("hidden");
            document.getElementById("zoomLoader").style.display = "block";
            img.src = imgSrc;
            modal.classList.remove("hidden");
        }

        function closeZoom() {
            document.getElementById("zoomModal").classList.add("hidden");
        }

        loadData();
    </script>
</body>
</html>
